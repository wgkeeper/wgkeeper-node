pre-commit:
  parallel: true
  commands:
    gofmt:
      glob: "*.go"
      run: gofmt -l {staged_files} | grep . && echo "run gofmt" && exit 1 || exit 0
    go-vet:
      run: go vet ./...

pre-push:
  commands:
    golangci-lint:
      run: "$(go env GOPATH)/bin/golangci-lint run"
    tests:
      run: go test ./...
    build:
      run: go build -o /dev/null ./...
    govulncheck:
      run: "$(go env GOPATH)/bin/govulncheck ./..."
    mod-tidy:
      run: go mod tidy && git diff --exit-code go.mod go.sum
