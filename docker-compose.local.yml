services:
  wireguard:
    image: ghcr.io/wgkeeper/node:1.2.0
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./wireguard:/etc/wireguard
      - ./certs:/app/certs:ro
      # Optional: persist peer store (set wireguard.peer_store_file: "/app/peers/peers.db" in config)
      # - ./peers:/app/peers
    ports:
      - "51820:51820/udp"
      - "51821:51821"
      # Do NOT publish the metrics port (e.g. 9090) on the host.
      # Keep /metrics inside the Docker network — let Prometheus scrape
      # via the service name. See README → Metrics for an example.
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://127.0.0.1:51821/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  # Optional: Prometheus to scrape wireguard:9090 inside this network.
  # Enable `metrics:` in config.yaml first. Generate the token with:
  #   openssl rand -hex 32 > ./wgkeeper-token
  # Do NOT publish 9090 on the host — scrape only from inside Docker network.
  #
  # prometheus:
  #   image: prom/prometheus:v3.1.0
  #   restart: unless-stopped
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
  #     - ./wgkeeper-token:/etc/prometheus/wgkeeper-token:ro
  #     - prometheus_data:/prometheus

# volumes:
#   prometheus_data:

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
        - subnet: fd00:dead:beef::/64
