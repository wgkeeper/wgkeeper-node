services:
  wireguard:
    image: ghcr.io/wgkeeper/node:0.0.8
    restart: always
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./wireguard:/etc/wireguard
      - ./certs:/app/certs:ro
      # Optional: persist peer store (set wireguard.peer_store_file: "/app/peers/peers.json" in config)
      # - ./peers:/app/peers
    # In production we expose only the WireGuard UDP port on the host.
    # The REST API port (51821) stays internal to the Docker network and is
    # only reachable via the Caddy reverse proxy.
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=0
      - net.ipv6.conf.all.forwarding=1
      - net.ipv6.conf.default.forwarding=1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:51821/healthz"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  caddy:
    # Production reverse proxy: the only public HTTP(S) entrypoint.
    # Combine with server.allowed_ips and auth.api_key in config.yaml,
    # and restrict 80/443 on the host via firewall / security group.
    image: caddy:2
    restart: unless-stopped
    depends_on:
      wireguard:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    enable_ipv6: true
    ipam:
      config:
        - subnet: 172.18.0.0/16
        - subnet: fd00:dead:beef::/64
